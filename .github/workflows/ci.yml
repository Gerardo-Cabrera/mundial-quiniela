name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Mínimo privilegio: el CI solo lee el repo (no publica ni escribe nada).
permissions:
  contents: read

# Cancela ejecuciones previas de la misma rama/PR si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend · pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      # Lint pyflakes (imports/variables sin uso, etc.); reglas en backend/ruff.toml.
      - name: Lint (ruff)
        run: |
          pip install ruff==0.15.20
          ruff check .
      # La suite usa SQLite en memoria: no necesita PostgreSQL ni servicios.
      - name: Tests
        run: pytest -q

  frontend:
    name: Frontend · vitest + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      # ESLint: reglas que tsc no cubre (rules-of-hooks, exhaustive-deps).
      - name: Lint (eslint)
        run: npm run lint
      - name: Tests (vitest)
        run: npm run test
      - name: Build (type-check + bundle)
        run: npm run build
